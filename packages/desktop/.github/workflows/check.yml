name: Check Desktop
on:
  pull_request:
    paths:
      - 'packages/desktop/**'
      - 'src/**'

jobs:
  check:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: packages/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
        working-directory: .
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm run test:e2e
